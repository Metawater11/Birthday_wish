<audio id="audio-player"></audio>

<script>
    const songs = [
        {
            file: "song1.mp3", // Ilakana Kavithai
            ans: ["ilakana kavithai", "ilakana", "banaras", "kavithai"],
            vibe: "Song 1: your fav.. melody! Remember?",
        },
        {
            file: "song2.mp3", // Katre Poongatre
            ans: ["katre poongatre", "katre", "priyamana thozhi", "priyamanathozhi"],
            vibe: "Song 2: Our favorite friendship anthem! 🎶",
        },
        {
            file: "song3.mp3", // Pookkal Pookkum
            ans: ["pookkal pookkum", "pookal pookum", "madharasapattinam", "madrasapattinam", "pookal"],
            vibe: "Song 3: The ultimate classic from Madrasapattinam!",
        }
    ];

    let currentRound = 0;
    let timer;
    let timeLeft = 30;
    const player = document.getElementById('audio-player');

    function startQuiz() {
        document.getElementById('welcome').classList.remove('active');
        document.getElementById('quiz').classList.add('active');
        loadRound();
    }

    function loadRound() {
        const song = songs[currentRound];
        document.getElementById('round-num').innerText = `MEMORY ${currentRound + 1}/3`;
        document.getElementById('memory-vibe').innerText = song.vibe;
        document.getElementById('answer').value = '';
        document.getElementById('feedback').innerText = '';
        timeLeft = 30;
        document.getElementById('timer-bar').style.width = '100%';

        // Load and Play local MP3
        player.src = song.file;
        player.play();
        startTimer();
    }

    function startTimer() {
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-bar').style.width = (timeLeft / 30 * 100) + "%";
            if (timeLeft <= 0) {
                clearInterval(timer);
                player.pause();
                document.getElementById('feedback').innerText = "Time Up! Replaying...";
                setTimeout(loadRound, 1500);
            }
        }, 1000);
    }

    function verifyAnswer() {
        const input = document.getElementById('answer').value.toLowerCase().trim();
        const song = songs[currentRound];

        const isCorrect = song.ans.some(a => input.includes(a) && input.length >= 4);

        if (isCorrect) {
            clearInterval(timer);
            player.pause();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            document.getElementById('feedback').innerHTML = "<span style='color:#4CAF50'>Semma! Correct answer. ✨</span>";

            setTimeout(() => {
                currentRound++;
                if (currentRound < 3) loadRound();
                else showTreasure();
            }, 2000);
        } else {
            document.getElementById('feedback').innerHTML = "<span style='color:#f44336'>Try again! Think of the movie...</span>";
        }
    }

    function showTreasure() {
        document.getElementById('quiz').classList.remove('active');
        document.getElementById('treasure').classList.add('active');

        var end = Date.now() + (5 * 1000);
        (function frame() {
            confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#FFD700', '#ec407a'] });
            confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#FFD700', '#ec407a'] });
            if (Date.now() < end) requestAnimationFrame(frame);
        }());
    }
</script>
