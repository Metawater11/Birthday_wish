<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise for Brindha!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&family=Noto+Sans+Tamil:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --madurai-gold: #FFD700;
            --deep-purple: #2d0b5a;
            --vibrant-pink: #ec407a;
            --glass: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', 'Noto Sans Tamil', sans-serif;
            background: linear-gradient(135deg, #1a0533 0%, #2d0b5a 50%, #4a0e4e 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        /* --- FLOATING PHOTOS (MOVING) --- */
        #floating-background {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none;
        }
        .floating-photo {
            position: absolute;
            width: 80px; height: 80px;
            object-fit: cover; border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            opacity: 0.4;
            animation: circulate linear infinite;
        }

        /* --- PINNED PHOTOS (SOLID/IMMOVABLE) --- */
        .pinned-photo {
            position: fixed;
            width: 120px; /* Slightly larger */
            height: 140px;
            background: white; /* Polaroid style */
            padding: 8px 8px 25px 8px;
            box-shadow: 5px 10px 20px rgba(0,0,0,0.5);
            z-index: 2; /* Sits above floating but below container */
            pointer-events: none;
        }
        .pinned-photo img {
            width: 100%; height: 100%; object-fit: cover;
        }

        /* Positioning the solid photos */
        #pin1 { top: 5%; left: 5%; transform: rotate(-15deg); }
        #pin2 { top: 10%; right: 8%; transform: rotate(10deg); }
        #pin3 { bottom: 10%; left: 7%; transform: rotate(-5deg); }
        #pin4 { bottom: 5%; right: 5%; transform: rotate(15deg); }

        @keyframes circulate {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(20px, -30px) rotate(5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* --- MAIN UI STYLES --- */
        .container {
            width: 92%; max-width: 420px;
            padding: 2.2rem;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            z-index: 10; /* Above everything */
            position: relative;
        }

        h1 { font-family: 'Dancing Script', cursive; color: var(--madurai-gold); font-size: 2.5rem; margin-bottom: 0.5rem; }
        .sub-text { font-size: 0.9rem; margin-bottom: 1.5rem; opacity: 0.9; line-height: 1.6; }
        .screen { display: none; animation: slideUp 0.6s ease-out; }
        .active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .btn {
            background: linear-gradient(45deg, var(--madurai-gold), #ffb300);
            color: #1a0533; border: none; padding: 15px 30px; border-radius: 50px;
            font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4); font-size: 0.85rem;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--madurai-gold); }

        .timer-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: linear-gradient(90deg, var(--vibrant-pink), var(--madurai-gold)); transition: width 1s linear; }

        input[type="text"] {
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid transparent;
            background: rgba(0,0,0,0.4); color: white; margin-top: 10px; text-align: center; font-size: 1rem;
        }
        input:focus { border-color: var(--madurai-gold); outline: none; }

        #treasure-qr { width: 100%; max-width: 220px; border: 6px solid var(--madurai-gold); border-radius: 15px; margin: 15px 0; background: white; padding: 5px; }
        .audio-status { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; margin: 10px 0; font-size: 0.85rem; border-left: 4px solid var(--madurai-gold); }
        #feedback { margin-top: 10px; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

<div class="pinned-photo" id="pin1"><img src="solid1.jpg" alt="Memory 1"></div>
<div class="pinned-photo" id="pin2"><img src="solid2.jpg" alt="Memory 2"></div>
<div class="pinned-photo" id="pin3"><img src="solid3.jpg" alt="Memory 3"></div>
<div class="pinned-photo" id="pin4"><img src="solid4.jpg" alt="Memory 4"></div>

<div id="floating-background"></div>

<div class="container">
    <div id="welcome" class="screen active">
        <h1>aarambikalama! ponnae...</h1>
        <p class="sub-text">Happy Birthday <strong>Brindha..😽💖🥰🦚</strong>! 🎉
            <br>
        <h1>MY thozhi...</h1>
        <br>இந்த 3 songs unaku pidikum. 3/3 score பண்ணா மட்டும்தான் உன்னோட Birthday  special Video வரும்!</p>
        <button class="btn" onclick="startQuiz()">🎵 Start Memory Quiz</button>
    </div>


    <div id="quiz" class="screen">
        <h2 id="round-num" style="color: var(--madurai-gold);">Song 1/3</h2>
        <div class="timer-container"><div id="timer-bar"></div></div>
        <div id="memory-vibe" class="audio-status"></div>
        <input type="text" id="answer" placeholder="Movie or Song name..." autocomplete="off">
        <button class="btn" style="margin-top: 15px;" onclick="verifyAnswer()">Check Answer</button>
        <p id="feedback"></p>
    </div>

    <div id="treasure" class="screen">
        <h1 style="color: var(--madurai-gold);">You Legend! 🏆</h1>
        <p>The memories are safe with you.</p>
        <img src="frame%20(1).png" id="treasure-qr" alt="QR Code">
        <p style="color: var(--madurai-gold); font-weight: bold;">Scan for your video! ❤️</p>
    </div>
</div>

<audio id="audio-player"></audio>

<script>
    // 1. UPDATE YOUR PHOTOS HERE
    const movingPhotos = ["photo1.jpg", "photo2.jpg", "photo3.jpg", "photo4.jpg"];

    const songs = [
        { file: "song1.mp3", ans: ["ilakana kavithai", "ilakana", "banaras", "kavithai"], vibe: "Round 1: Remember this?", startAt: 45 },
        { file: "song2.mp3", ans: ["katre poongatre", "katre", "priyamana thozhi"], vibe: "Round 2: Friendship anthem!", startAt: 65 },
        { file: "song3.mp3", ans: ["pookkal pookkum", "madharasapattinam"], vibe: "Round 3: The classic!", startAt: 70 }
    ];

    let currentRound = 0;
    let timer;
    let timeLeft = 30;
    const player = document.getElementById('audio-player');

    function initBackground() {
        const bg = document.getElementById('floating-background');
        for (let i = 0; i < 10; i++) {
            const img = document.createElement('img');
            img.src = movingPhotos[i % movingPhotos.length];
            img.className = 'floating-photo';
            img.style.left = Math.random() * 90 + 'vw';
            img.style.top = Math.random() * 90 + 'vh';
            const duration = 15 + Math.random() * 15;
            img.style.animationDuration = duration + 's';
            img.style.animationDelay = -(Math.random() * duration) + 's';
            bg.appendChild(img);
        }
    }

    function startQuiz() {
        document.getElementById('welcome').classList.remove('active');
        document.getElementById('quiz').classList.add('active');
        loadRound();
    }

    function loadRound() {
        const song = songs[currentRound];
        document.getElementById('round-num').innerText = `MEMORY ${currentRound + 1}/3`;
        document.getElementById('memory-vibe').innerText = song.vibe;
        document.getElementById('answer').value = '';
        document.getElementById('feedback').innerText = '';
        timeLeft = 30;
        document.getElementById('timer-bar').style.width = '100%';
        player.src = song.file;
        player.onloadedmetadata = function() {
            player.currentTime = song.startAt;
            player.play().catch(() => { document.getElementById('feedback').innerText = "Click 'Check' to hear audio!"; });
        };
        startTimer();
    }

    function startTimer() {
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-bar').style.width = (timeLeft / 30 * 100) + "%";
            if (timeLeft <= 0) { clearInterval(timer); player.pause(); loadRound(); }
        }, 1000);
    }

    function verifyAnswer() {
        const input = document.getElementById('answer').value.toLowerCase().trim();
        const isCorrect = songs[currentRound].ans.some(a => input.includes(a) && input.length >= 4);
        if (isCorrect) {
            clearInterval(timer); player.pause();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            setTimeout(() => {
                currentRound++;
                if (currentRound < 3) loadRound();
                else {
                    document.getElementById('quiz').classList.remove('active');
                    document.getElementById('treasure').classList.add('active');
                }
            }, 2000);
        } else {
            document.getElementById('feedback').innerHTML = "<span style='color:#f44336'>Try again!</span>";
        }
    }

    window.onload = initBackground;
</script>
</body>
</html>
